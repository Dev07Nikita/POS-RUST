server.port=8080
spring.application.name=pos-backend
spring.datasource.url=jdbc:sqlite:pos.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# M-Pesa Daraja API (get credentials from https://developer.safaricom.co.ke)
# Sandbox: create an app in "My Apps" to get Consumer Key and Consumer Secret
# Callback URL must be publicly reachable (e.g. ngrok for local: https://your-ngrok-url.ngrok.io/api/mpesa/callback)
mpesa.environment=sandbox
mpesa.consumer.key=${MPESA_CONSUMER_KEY:your_sandbox_consumer_key}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET:your_sandbox_consumer_secret}
mpesa.shortcode=174379
mpesa.passkey=${MPESA_PASSKEY:your_sandbox_passkey}
mpesa.callback.url=${MPESA_CALLBACK_URL:https://your-ngrok-url.ngrok.io/api/mpesa/callback}
