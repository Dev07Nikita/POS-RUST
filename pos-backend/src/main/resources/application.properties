server.port=8080
spring.application.name=pos-backend
spring.datasource.url=jdbc:sqlite:pos.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================================================
# M-Pesa Daraja API Configuration
# Docs  : https://developer.safaricom.co.ke/APIs
# Portal: https://developer.safaricom.co.ke/MyApps
#
# QUICKSTART — run ONE command to configure everything:
#   cd 'E:\POS RUST'
#   .\start-mpesa-tunnel.ps1 -ConsumerKey YOUR_KEY -ConsumerSecret YOUR_SECRET -Passkey YOUR_PASSKEY
#
# That script will:
#   - Install + start ngrok
#   - Auto-fill the ngrok URL below
#   - Patch this file ready to go
#
# Where to get your credentials:
#   1. Go to https://developer.safaricom.co.ke/MyApps
#   2. Log in (or create a free account)
#   3. Click your App (or create one with "Add a new App")
#   4. Copy "Consumer Key" and "Consumer Secret"
#   5. Click "Lipa Na M-Pesa" tab → copy the "Online Passkey"
# =============================================================

# Environment: sandbox | production
mpesa.environment=sandbox

# ── Credentials (replace YOUR_* with real values, or use env vars) ──
mpesa.consumer.key=${MPESA_CONSUMER_KEY:YOUR_CONSUMER_KEY_HERE}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET:YOUR_CONSUMER_SECRET_HERE}
mpesa.passkey=${MPESA_PASSKEY:YOUR_PASSKEY_HERE}

# ── Shortcodes ──────────────────────────────────────────────
# Sandbox STK Push shortcode (from your app's "Lipa Na M-Pesa" section)
mpesa.shortcode=${MPESA_SHORTCODE:600991}
# C2B registration shortcode (usually the same)
mpesa.c2b.shortcode=${MPESA_C2B_SHORTCODE:600991}

# ── ngrok URLs (auto-filled by start-mpesa-tunnel.ps1) ──────
# Replace YOUR_NGROK_URL with your actual ngrok https URL
# Example: https://abc123.ngrok-free.app
mpesa.public.url=${MPESA_PUBLIC_URL:https://YOUR_NGROK_URL.ngrok-free.app}
mpesa.callback.url=${MPESA_CALLBACK_URL:https://YOUR_NGROK_URL.ngrok-free.app/api/mpesa/callback}
