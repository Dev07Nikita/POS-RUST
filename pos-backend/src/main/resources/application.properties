server.port=8080
spring.application.name=pos-backend
spring.datasource.url=jdbc:sqlite:pos.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================================
# M-Pesa Daraja API Configuration
# Docs: https://developer.safaricom.co.ke/APIs
# Sandbox portal: https://developer.safaricom.co.ke/MyApps
# =============================================================

# Environment: sandbox | production
mpesa.environment=sandbox

# OAuth credentials — create an App on developer.safaricom.co.ke to get these
mpesa.consumer.key=${MPESA_CONSUMER_KEY:your_sandbox_consumer_key}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET:your_sandbox_consumer_secret}

# STK Push shortcode (Paybill/Till number shown in your sandbox app — usually 600991 or 174379)
mpesa.shortcode=${MPESA_SHORTCODE:600991}

# C2B shortcode (for registerurl — same as shortcode in most cases, but can be overridden)
mpesa.c2b.shortcode=${MPESA_C2B_SHORTCODE:600991}

# Lipa na M-Pesa Online Passkey — shown in sandbox app "Lipa Na M-Pesa" section
mpesa.passkey=${MPESA_PASSKEY:your_sandbox_passkey}

# Publicly reachable base URL for your server (use ngrok for local dev)
# Example: https://abc123.ngrok-free.app
# STK Push callback URL (e.g. https://your-ngrok.ngrok-free.app/api/mpesa/callback)
mpesa.callback.url=${MPESA_CALLBACK_URL:https://your-ngrok-url.ngrok-free.app/api/mpesa/callback}

# Public base URL for building C2B confirmation/validation URLs
# The service will append /api/mpesa/callback/confirmation and /api/mpesa/callback/validation
mpesa.public.url=${MPESA_PUBLIC_URL:https://your-ngrok-url.ngrok-free.app}
