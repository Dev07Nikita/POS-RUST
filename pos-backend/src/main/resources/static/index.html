<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safi POS | Modern Retail Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .pos-grid { display: grid; grid-template-columns: 1fr minmax(280px, 400px); height: calc(100vh - 80px); gap: 1rem; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) {
            .pos-grid { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 80px); }
            .cart-aside { max-height: 40vh; }
        }
        .payment-btn { min-height: 48px; touch-action: manipulation; }
        .mpesa-modal-inner { max-width: 96vw; width: 100%; }
        @media (min-width: 640px) { .mpesa-modal-inner { width: 24rem; } }
    </style>
</head>
<body class="overflow-hidden">
    <!-- Navigation -->
    <nav class="h-20 glass m-4 rounded-2xl flex items-center justify-between px-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center font-bold text-white text-xl">S</div>
            <h1 class="text-2xl font-bold tracking-tight">Safi<span class="text-amber-500">POS</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="showPOS()" class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">POS</button>
            <button onclick="showAnalytics()" class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Analytics</button>
            <button onclick="showAdminHub()" class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Admin Hub</button>
            <div class="text-right">
                <p class="text-xs text-slate-400">Cashier</p>
                <p class="font-semibold">Main Register</p>
            </div>
            <div class="w-12 h-12 bg-slate-800 rounded-full border border-slate-700"></div>
        </div>
    </nav>

    <main id="pos-main" class="pos-grid gap-4 px-4">
        <!-- Products Area -->
        <section class="glass rounded-3xl p-6 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div class="relative w-96">
                    <input type="text" placeholder="Search products or scan barcode..." 
                           class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-5 focus:outline-none focus:ring-2 focus:ring-amber-500 text-white">
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">All</button>
                    <button class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Snacks</button>
                    <button class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Drinks</button>
                </div>
            </div>

            <div class="grid grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto scrollbar-hide pr-2" id="product-grid">
                <!-- Products will be injected here -->
            </div>
        </section>

        <!-- Cart Area -->
        <aside class="glass rounded-3xl p-6 flex flex-col h-full cart-aside">
            <h2 class="text-xl font-bold mb-4">Current Order</h2>
            <div class="flex-grow overflow-y-auto scrollbar-hide space-y-4 mb-6 min-h-0" id="cart-items">
                <!-- Cart items will be injected here -->
            </div>

            <div class="space-y-3 pt-6 border-t border-slate-700">
                <div class="flex justify-between text-slate-400">
                    <span>Subtotal</span>
                    <span id="subtotal">KES 0.00</span>
                </div>
                <div class="flex justify-between text-slate-400">
                    <span>Tax (16%)</span>
                    <span id="tax">KES 0.00</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-white pt-2">
                    <span>Total</span>
                    <span id="total" class="text-amber-500">KES 0.00</span>
                </div>
                
                <div class="pt-4 grid grid-cols-2 gap-3">
                    <button type="button" onclick="checkoutCash()" class="payment-btn py-4 glass rounded-2xl font-bold hover:bg-slate-700 transition active:scale-95">CASH</button>
                    <button type="button" class="payment-btn py-4 gold-gradient rounded-2xl font-bold text-white shadow-lg shadow-amber-900/20 hover:scale-[1.02] transition active:scale-95" onclick="checkoutMpesa()">M-PESA</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Analytics Panel -->
    <div id="analytics-panel" class="hidden p-4 sm:p-6 max-w-4xl mx-auto overflow-y-auto">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-2">
            <h2 class="text-2xl font-bold">Analytics</h2>
            <button onclick="showPOS()" class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Back to POS</button>
        </div>
        <div id="analytics-content" class="space-y-4">
            <p class="text-slate-400">Click "Analytics" to load. Transactions (cash and M-Pesa) are integrated here.</p>
        </div>
    </div>

    <!-- Admin Hub Panel -->
    <div id="admin-hub-panel" class="hidden p-4 sm:p-6 max-w-6xl mx-auto overflow-y-auto">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-2">
            <h2 class="text-2xl font-bold">Admin Hub</h2>
            <button onclick="showPOS()" class="px-4 py-2 glass rounded-xl text-sm font-medium hover:bg-slate-700 transition">Back to POS</button>
        </div>
        <div id="admin-hub-content" class="space-y-6">
            <p class="text-slate-400">Loading...</p>
        </div>
    </div>

    <!-- M-Pesa Modal (responsive) -->
    <div id="mpesa-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center backdrop-blur-sm z-50 p-4">
        <div class="glass mpesa-modal-inner p-6 sm:p-8 rounded-2xl sm:rounded-[2rem] text-center border-amber-500/30">
            <div class="w-16 h-16 bg-green-500 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-3xl font-bold">M</div>
            <h3 class="text-2xl font-bold mb-2">M-Pesa Checkout</h3>
            <p class="text-slate-400 mb-6 text-sm">Enter the customer's phone number to trigger an STK Push.</p>
            <input type="tel" id="customer-phone" placeholder="07XX XXX XXX" 
                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl py-4 px-4 sm:px-6 mb-6 text-center text-lg sm:text-xl font-bold tracking-widest focus:border-amber-500 outline-none">
            <button type="button" class="w-full py-4 gold-gradient rounded-2xl font-bold text-base sm:text-lg mb-3 payment-btn" onclick="confirmPayment()">PUSH TO PHONE</button>
            <button type="button" class="w-full py-2 text-slate-500 text-sm" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-xl glass border border-amber-500/50 text-sm hidden z-50"></div>
    <script src="js/app.js"></script>
</body>
</html>
