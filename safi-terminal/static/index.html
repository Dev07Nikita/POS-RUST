<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safi POS Hybrid | Modern Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .rust-badge {
            background: #ce412b;
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 10px;
        }

        .pos-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 80px);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="overflow-hidden">
    <!-- Navigation -->
    <nav class="h-20 glass m-4 rounded-2xl flex items-center justify-between px-8">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center font-bold text-white text-xl">
                S</div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight leading-none">Safi<span class="text-amber-500">POS</span>
                </h1>
                <span class="rust-badge uppercase">Rust Edge Powered</span>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-xs text-slate-400">Cashier: <span class="text-white font-medium"
                        id="display-cashier">Cashier Name</span></p>
                <div class="flex items-center gap-2 justify-end">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] text-slate-400">Backend Sync Active</span>
                </div>
            </div>
            <div class="w-12 h-12 bg-slate-800 rounded-full border border-slate-700"></div>
        </div>
    </nav>

    <main class="pos-grid gap-4 px-4">
        <!-- Products Area -->
        <section class="glass rounded-3xl p-6 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <input type="text" placeholder="Scan or search..."
                    class="w-80 bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-5 focus:ring-2 focus:ring-amber-500 text-white outline-none">
                <div class="flex gap-2">
                    <button class="px-4 py-2 glass rounded-xl text-sm hover:bg-slate-700">All</button>
                    <button class="px-4 py-2 glass rounded-xl text-sm hover:bg-slate-700">Retail</button>
                    <button class="px-4 py-2 glass rounded-xl text-sm hover:bg-slate-700">Bakery</button>
                </div>
            </div>

            <div class="grid grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto scrollbar-hide pr-2" id="product-grid">
                <!-- Products -->
            </div>
        </section>

        <!-- Cart Area -->
        <aside class="glass rounded-3xl p-6 flex flex-col h-full">
            <h2 class="text-xl font-bold mb-4">Cart Assets</h2>
            <div class="flex-grow overflow-y-auto scrollbar-hide space-y-4 mb-6" id="cart-items">
                <!-- Order Items -->
            </div>

            <div class="space-y-3 pt-6 border-t border-slate-700">
                <div class="flex justify-between text-2xl font-bold text-white mb-4">
                    <span>Total KES</span>
                    <span id="total-val" class="text-amber-500">0.00</span>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="openPaymentModal('M-PESA')"
                        class="py-4 gold-gradient rounded-2xl font-bold text-lg hover:scale-[1.01] transition shadow-lg shadow-amber-900/20">M-PESA
                        STK PUSH</button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="openPaymentModal('KCB')"
                            class="py-3 glass rounded-xl font-bold border-blue-500/30 hover:bg-blue-900/10">KCB</button>
                        <button onclick="openPaymentModal('EQUITY')"
                            class="py-3 glass rounded-xl font-bold border-red-500/30 hover:bg-red-900/10">EQUITY</button>
                    </div>
                    <button onclick="processCash()" class="py-3 glass rounded-xl font-bold border-slate-500/30">CASH
                        PAYMENT</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Unified Payment Modal -->
    <div id="payment-modal"
        class="fixed inset-0 bg-black/80 hidden flex items-center justify-center backdrop-blur-md z-50">
        <div class="glass w-[450px] p-10 rounded-[2.5rem] border-amber-500/30">
            <div id="payment-content" class="text-center">
                <!-- Dynamic Content -->
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receipt-modal"
        class="fixed inset-0 bg-black/90 hidden flex items-center justify-center backdrop-blur-xl z-[60]">
        <div class="bg-white w-[380px] p-8 text-slate-900 rounded-3xl shadow-2xl relative">
            <div class="text-center mb-6">
                <h3 class="text-2xl font-black uppercase tracking-tighter" id="receipt-biz">BUSINESS NAME</h3>
                <p class="text-xs text-slate-500" id="receipt-date"></p>
            </div>
            <div class="space-y-2 border-y border-dashed py-4 mb-4" id="receipt-items"></div>
            <div class="flex justify-between font-black text-xl mb-6">
                <span>TOTAL</span>
                <span id="receipt-total"></span>
            </div>
            <div class="flex justify-center mb-4">
                <img id="receipt-qr" class="w-48 h-48 border-4 border-slate-100 p-2 rounded-2xl">
            </div>
            <p class="text-center text-[10px] text-slate-400 mb-6">Scan QR to verify transaction authenticity</p>
            <button onclick="closeReceipt()" class="w-full py-4 gold-gradient rounded-2xl font-bold text-white">PRINT &
                CLOSE</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
